version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: paymanager-mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: paymanager-backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: paymanager-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data: